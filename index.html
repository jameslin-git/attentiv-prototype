    .header{background:var(--dark);height:54px;display:flex;align-items:center;gap:16px;padding:0 20px;flex-shrink:0;position:relative;border-bottom:1px solid rgba(255,255,255,.06)}

    .hchip.active{background:rgba(58,85,255,.35);border-color:rgba(58,85,255,.5);color:#fff}
    .hchip .dot{width:7px;height:7px;border-radius:50%}
    .hmid{margin-left:auto;display:flex;align-items:center;gap:8px}
    .hselect{font-family:var(--font);font-size:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:6px;color:rgba(255,255,255,.7);padding:4px 9px;cursor:pointer}
    .hselect option{background:#090A0F}
    .avatar{width:30px;height:30px;background:var(--gradient-cta);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;cursor:pointer;flex-shrink:0}
    .body{display:flex;flex:1;overflow:hidden}
    .sidebar{width:188px;background:var(--white);border-right:1px solid var(--gray);padding:12px 10px;display:flex;flex-direction:column;gap:3px;flex-shrink:0;overflow-y:auto}
    .slabel{font-size:9.5px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;padding:8px 8px 3px}
    .sitem{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;cursor:pointer;font-size:12.5px;font-weight:500;color:var(--sub);transition:all .12s;border:none;background:none;width:100%;text-align:left}
    .sitem:hover{background:var(--gray);color:var(--dark)}
    .sitem.active{background:linear-gradient(135deg,#eef1ff,#e6f5ff);color:var(--blue);font-weight:600}
    .sitem .si{font-size:15px;width:17px;text-align:center;flex-shrink:0}
    .sbadge{margin-left:auto;font-size:10px;font-weight:600;background:var(--error);color:#fff;border-radius:10px;padding:1px 6px}
    .main{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:18px;min-width:0}
    /* Cards */
    .card{background:var(--white);border-radius:12px;box-shadow:var(--shadow);padding:18px}
    .card-sm{padding:14px}
    .gbar{height:3px;background:var(--gradient);border-radius:2px;margin-bottom:14px}
    /* Page header */
    .pg-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px}
    .pg-title{font-size:20px;font-weight:700;letter-spacing:-.5px}
    .pg-sub{font-size:12px;color:var(--mid);margin-top:3px}
    /* Section */
    .sec-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .sec-title{font-size:13.5px;font-weight:700;letter-spacing:-.2px}
    .sec-sub{font-size:11px;color:var(--mid);margin-top:2px}
    /* Grids */
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
    .g5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
    .g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
    /* KPI cards */
    .kpi{background:var(--white);border-radius:12px;box-shadow:var(--shadow);padding:14px;border-top:3px solid var(--muted)}

    .kpi-lbl{font-size:10.5px;font-weight:500;color:var(--mid);text-transform:uppercase;letter-spacing:1.1px}

    .kpi-period{font-size:10px;color:var(--mid);margin-top:2px}

    .tbl-wrap{overflow-x:auto}

    thead tr{background:var(--dark)}
    thead th{padding:9px 12px;text-align:left;font-size:10.5px;font-weight:600;color:rgba(255,255,255,.8);text-transform:uppercase;letter-spacing:.9px;white-space:nowrap}
    thead th:first-child{border-radius:7px 0 0 7px} thead th:last-child{border-radius:0 7px 7px 0}
    tbody tr{border-bottom:1px solid var(--gray);transition:background .1s}
    tbody tr:hover{background:#f8fafd} tbody tr:last-child{border-bottom:none}
    td{padding:11px 12px;font-size:12px;white-space:nowrap}
    /* Tier badges */

    .tier-MID{background:#fffbeb;color:#b45309} .tier-WEAK{background:#fef2f2;color:#b91c1c}

    .funnel-row{display:grid;grid-template-columns:160px 1fr 90px 90px 90px;align-items:center;gap:10px;margin-bottom:8px}
    .fbarlbl{font-size:12px;font-weight:500;text-align:right;color:var(--dark)}

    .fbar{height:100%;border-radius:7px;transition:width .5s ease;position:relative}
    .fbar-val{position:absolute;top:50%;left:10px;transform:translateY(-50%);font-size:11px;font-weight:600;color:#fff;z-index:1}
    .fmark{position:absolute;top:0;bottom:0;width:2px;border-radius:1px;z-index:2}
    .fmark-lbl{position:absolute;top:-18px;font-size:9px;font-weight:600;white-space:nowrap;transform:translateX(-50%);color:var(--sub)}
    .fval{font-size:12px;font-weight:600;color:var(--dark);font-family:var(--mono);text-align:right}
    .fbm{font-size:11px;color:var(--mid);text-align:right}

    .diag-card{border-radius:8px;padding:12px 14px;margin-top:6px;border-left:3px solid transparent}
    .diag-WEAK{background:#fff5f5;border-left-color:var(--error);color:#7f1d1d}
    .diag-MID{background:#fffbeb;border-left-color:var(--warning);color:#78350f}

    .diag-STAR{background:#f0fdf4;border-left-color:var(--success);color:#14532d}

    .btn-primary{font-family:var(--font);font-size:11px;font-weight:600;padding:5px 12px;border-radius:6px;border:none;background:var(--gradient-cta);color:#fff;cursor:pointer}
    /* Risk */

    .risk-row:last-child{border-bottom:none}
    .risk-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .rbar-wrap{flex:1;height:6px;background:var(--gray);border-radius:3px;overflow:hidden}
    .rbar{height:100%;border-radius:3px}
    /* Scrollbar */
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--muted);border-radius:10px}
    .mono{font-family:var(--mono)}

    .stab{font-family:var(--font);font-size:12px;font-weight:500;padding:6px 14px;border-radius:6px;border:none;background:none;cursor:pointer;color:var(--sub);transition:all .12s}
    .stab:hover{background:var(--gray);color:var(--dark)}

    .gp-textarea:focus{border-color:var(--blue)}
    .risk-word{background:#fef2f2;color:#b91c1c;border-radius:3px;padding:1px 4px;font-weight:600}
